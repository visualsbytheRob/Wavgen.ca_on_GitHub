name: Build and Deploy Eleventy Site

# Run on manual trigger and automatic push to main/master branches
on:
  workflow_dispatch:
  # Enable automatic deployment on push to main branch
  push:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Add the required environment for GitHub Pages
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      contents: read
      pages: write
      id-token: write

    steps:
    - name: Checkout
      uses: actions/checkout@v5

    - name: Setup Node.js
      uses: actions/setup-node@v5
      with:
        node-version: '18'
        cache: 'npm'

    - name: Install dependencies
      run: npm ci

    - name: Build Eleventy site
      run: npm run build

    - name: Setup Pages
      uses: actions/configure-pages@v5

    - name: Upload artifact
      uses: actions/upload-pages-artifact@v3
      with:
        path: '_site'

    - name: Deploy to GitHub Pages
      id: deployment
      uses: actions/deploy-pages@v5

    - name: Notify Slack — deploy result
      if: always() && env.SLACK_WEBHOOK_AGENT_LOGS != ''
      env:
        SLACK_WEBHOOK_AGENT_LOGS: ${{ secrets.SLACK_WEBHOOK_AGENT_LOGS }}
        STATUS: ${{ job.status }}
        PAGE_URL: ${{ steps.deployment.outputs.page_url }}
        RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        COMMIT: ${{ github.sha }}
      run: |
        jq -n \
          --arg status "$STATUS" \
          --arg page "$PAGE_URL" \
          --arg run "$RUN_URL" \
          --arg sha "${COMMIT:0:7}" \
          '{text: ("Deploy " + $status + " for " + $sha + " — <" + $run + "|run> · <" + $page + "|site>")}' \
        | curl -sS -X POST -H 'Content-type: application/json' \
            --data @- "$SLACK_WEBHOOK_AGENT_LOGS"
