name: Collect diary email replies (IMAP → markdown entries)

# Polls Gmail every 2 hours for replies to "Wavgen prompt — …" emails.
# For each new reply: writes src/diary/entries/YYYY-MM-DD-slug.md, commits,
# pushes. Tracks processed Message-IDs in .diary-processed-replies.json
# so it never re-creates an entry.
#
# Uses the same GMAIL_USER + GMAIL_APP_PASSWORD secrets as the email-sending
# workflows. No new setup required if those are already configured.

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - name: Poll Gmail for replies and write entries
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
        run: node scripts/collect-diary-replies.js

      - name: Commit and push new entries
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/diary/entries/ .diary-processed-replies.json
          if git diff --cached --quiet; then
            echo "No new entries — nothing to commit."
            exit 0
          fi
          git commit -m "diary: capture email reply(s) $(date -u +%Y-%m-%d)"
          git push
