name: News briefing (RSS backup for Claude editorial loop)

# Free-tier backup for the Claude daily-news-loop trigger.
# Aggregates RSS feeds from music/video/data/art/world/Toronto/good-news
# sources, dedupes against the last 7 days of briefings, writes a markdown
# file to src/diary/news/YYYY-MM-DD.md, commits, pushes, emails.
#
# Skips silently if today's briefing already exists (e.g., the Claude loop
# already wrote it, so they coexist gracefully).
#
# Cron is in UTC. 10:30 UTC ≈ 6:30am ET (EDT) / 5:30am ET (EST — winter shifts 1h earlier),
# scheduled alongside the diary prompt so both land in your inbox first thing.
on:
  schedule:
    - cron: "30 10 * * *"
  workflow_dispatch:

permissions:
  contents: write

# Serialize against the other backup workflows that also commit to main —
# otherwise simultaneous runs race on `git push` and one fails.
concurrency:
  group: backup-workflows
  cancel-in-progress: false

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - run: node scripts/generate-briefing.js

      - name: Commit and push if briefing or news JSONs changed
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/diary/news/ src/_data/news/
          if git diff --cached --quiet; then
            echo "Nothing changed — no commit."
            echo "wrote_briefing=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # Email only fires if a NEW briefing markdown was written today
          # (JSON-only refreshes don't email — they're a quiet card update)
          if git diff --cached --name-only | grep -qE "src/diary/news/[0-9-]+\.md"; then
            echo "wrote_briefing=true" >> "$GITHUB_OUTPUT"
          else
            echo "wrote_briefing=false" >> "$GITHUB_OUTPUT"
          fi
          git commit -m "briefing: RSS digest $(date -u +%Y-%m-%d)"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Push attempt $i failed; retrying after 5s…"
            sleep 5
          done

      - name: Email today's briefing
        if: steps.commit.outputs.wrote_briefing == 'true'
        continue-on-error: true
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          BRIEFING_FILE="src/diary/news/$TODAY.md"
          if [ -f "$BRIEFING_FILE" ]; then
            { tail -n +6 "$BRIEFING_FILE"; printf "\n— Full briefing styled on wavgen.ca\nhttps://wavgen.ca/diary/\n"; } | node scripts/send-email.js "Wavgen briefing — $TODAY" || echo "[email] send failed — workflow continues (commit + push already succeeded)"
          fi
