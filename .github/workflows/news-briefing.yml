name: News briefing (RSS backup for Claude editorial loop)

# Free-tier backup for the Claude daily-news-loop trigger.
# Aggregates RSS feeds from music/video/data/art/world/Toronto/good-news
# sources, dedupes against the last 7 days of briefings, writes a markdown
# file to src/diary/news/YYYY-MM-DD.md, commits, pushes.
#
# Skips silently if today's briefing already exists (e.g., the Claude loop
# already wrote it, so they coexist gracefully).
#
# Cron is in UTC. 12:00 UTC ≈ 8am ET (EDT) / 7am ET (EST) on Mon/Wed/Fri.
on:
  schedule:
    - cron: "0 12 * * 1,3,5"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  briefing:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - run: npm ci

      - run: node scripts/generate-briefing.js

      - name: Commit and push if briefing was written
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/diary/news/
          if git diff --cached --quiet; then
            echo "No new briefing — nothing to commit."
            echo "wrote_briefing=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "briefing: RSS digest $(date -u +%Y-%m-%d)"
            git push
            echo "wrote_briefing=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Email today's briefing
        if: steps.commit.outputs.wrote_briefing == 'true'
        env:
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          EMAIL_TO: ${{ secrets.EMAIL_TO }}
        run: |
          TODAY=$(date -u +%Y-%m-%d)
          BRIEFING_FILE="src/diary/news/$TODAY.md"
          if [ -f "$BRIEFING_FILE" ]; then
            { tail -n +6 "$BRIEFING_FILE"; printf "\n— Full briefing styled on wavgen.ca\nhttps://wavgen.ca/diary/\n"; } | node scripts/send-email.js "Wavgen briefing — $TODAY"
          fi
